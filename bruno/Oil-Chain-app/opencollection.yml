opencollection: 1.0.0

info:
  name: Oil-Chain-app
  description: |-
    # Oil-Chain Validator API
    RESTful API for the anti-counterfeit lubricant validation system.
    The Express.js backend acts as a Relayer between the React frontend
    and the OilValidator.sol smart contract.

    ## Auth
    Protected endpoints require a Bearer JWT token obtained from POST /auth/login.
    Set the `token` collection variable after a successful login.

    ## Base URL
    Use the `baseUrl` variable to switch between environments.

bundled: false

vars:
  - name: baseUrl
    value: http://localhost:3000/api/v1
  - name: token
    value: ""

extensions:
  bruno:
    ignore:
      - node_modules
      - .git
