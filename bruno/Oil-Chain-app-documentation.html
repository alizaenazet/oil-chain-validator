    <title>Oil-Chain-app - API Documentation</title>

        body { margin: 0; padding: 0; }
        #opencollection-container { width: 100vw; height: 100vh; }

<body>
    <div id="opencollection-container"></div>
    <script>
        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: Oil-Chain-app\nconfig:\n  proxy:\n    inherit: true\n    config:\n      protocol: http\n      hostname: ''\n      port: ''\n      auth:\n        username: ''\n        password: ''\n      bypassProxy: ''\nitems:\n  - info:\n      name: Endpoin example\n      type: http\n      seq: 1\n    http:\n      method: GET\n      url: google.com?param-test=test-value\n      headers:\n        - name: Access-Control-Allow-Headers\n          value: test\n      params:\n        - name: param-test\n          value: test-value\n          type: query\n      auth: inherit\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: |-\n      # Docs Example\n      > test for docs with markdown format.\n  - info:\n      name: Admin\n      type: folder\n    items:\n      - info:\n          name: Batches\n          type: folder\n        items:\n          - info:\n              name: Register Product Batch\n              type: http\n              seq: 1\n            http:\n              method: POST\n              url: '{{baseUrl}}/admin/batches'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{token}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"variantId\": 1,\n                    \"serialNumbers\": [\n                      \"OIL-PERT-2024-000001\",\n                      \"OIL-PERT-2024-000002\",\n                      \"OIL-PERT-2024-000003\"\n                    ]\n                  }\n            runtime:\n              assertions:\n                - expression: res.status\n                  operator: eq\n                  value: '202'\n                - expression: res.body.success\n                  operator: eq\n                  value: 'true'\n                - expression: res.body.data.registered\n                  operator: isNumber\n                  value: ''\n            settings:\n              encodeUrl: true\n              timeout: 120000\n              followRedirects: false\n              maxRedirects: 5\n            docs: |-\n              # POST /admin/batches\n\n              Registers a batch of product serial numbers on-chain.\n              Maps to smart contract: `registerProductBatch(bytes32[] productIds, uint256 variantId)`\n\n              **Protected:** Requires Admin JWT Bearer token.\n\n              ## Critical Off-Chain Hashing Logic\n              The frontend sends **raw human-readable serial numbers**.\n              The backend MUST apply `keccak256` to each string BEFORE sending to the contract.\n\n              ```\n              productId[i] = keccak256(abi.encodePacked(serialNumbers[i]))\n              ```\n\n              This means QR codes printed on bottles will encode the raw serial number,\n              and the consumer validation flow hashes it identically before lookup.\n\n              ## Request Body\n              | Field           | Type     | Required | Description                                  |\n              |-----------------|----------|----------|----------------------------------------------|\n              | `variantId`     | number   | yes      | On-chain variant ID from `addVariant`         |\n              | `serialNumbers` | string[] | yes      | Array of raw serial number strings to hash   |\n\n              ## Success Response `202 Accepted`\n              ```json\n              {\n                \"success\": true,\n                \"data\": {\n                  \"variantId\": 1,\n                  \"registered\": 3,\n                  \"txHash\": \"0xdef456...\",\n                  \"productIds\": [\n                    \"0x7f83b1657ff1fc53b92dc18148a1d65dfc2d4b1fa3d677284addd200126d9069\",\n                    \"0x2c624232cdd221771294dfbb310aca000a0df6ac8b66b696d90ef06fdefb64a3\",\n                    \"0x19581e27de7ced00ff1ce50b2047e7a567c76b1cbaebabe5ef03f7c3017bb5b7\"\n                  ]\n                }\n              }\n              ```\n\n              ## Error Responses\n              | Status | Code                     | Scenario                                       |\n              |--------|--------------------------|------------------------------------------------|\n              | `401`  | `UNAUTHORIZED`           | Missing or invalid JWT token                   |\n              | `400`  | `VALIDATION_ERROR`       | Missing fields or empty `serialNumbers` array  |\n              | `404`  | `VARIANT_NOT_FOUND`      | Provided `variantId` does not exist on-chain   |\n              | `409`  | `PRODUCT_ALREADY_EXISTS` | One or more hashed IDs are already registered  |\n              | `500`  | `BLOCKCHAIN_TX_FAILED`   | Contract reverted or RPC unreachable           |\n\n              ```json\n              {\n                \"success\": false,\n                \"error\": {\n                  \"code\": \"PRODUCT_ALREADY_EXISTS\",\n                  \"message\": \"One or more product IDs in the batch are already registered.\",\n                  \"conflictingIds\": [\"OIL-PERT-2024-000001\"]\n                }\n              }\n              ```\n      - info:\n          name: Emergency\n          type: folder\n        items:\n          - info:\n              name: Emergency Revoke\n              type: http\n              seq: 1\n            http:\n              method: POST\n              url: '{{baseUrl}}/admin/emergency-revoke'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{token}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"serialNumbers\": [\n                      \"OIL-PERT-2024-000001\",\n                      \"OIL-PERT-2024-000002\"\n                    ],\n                    \"reason\": \"QR stickers stolen before distribution \u2014 Batch #B-2024-07\"\n                  }\n            runtime:\n              assertions:\n                - expression: res.status\n                  operator: eq\n                  value: '200'\n                - expression: res.body.success\n                  operator: eq\n                  value: 'true'\n                - expression: res.body.data.revoked\n                  operator: isNumber\n                  value: ''\n            settings:\n              encodeUrl: true\n              timeout: 120000\n              followRedirects: false\n              maxRedirects: 5\n            docs: |-\n              # POST /admin/emergency-revoke\n\n              Marks a set of product IDs as permanently invalid/compromised on-chain.\n              Maps to smart contract: `emergencyRevoke(bytes32[] compromisedIds)`\n\n              **Protected:** Requires Admin JWT Bearer token.\n\n              **Use Case:** QR stickers stolen before distribution, human error in batch\n              registration, or any security incident requiring immediate invalidation.\n              The on-chain record is NOT deleted \u2014 the status is changed to `REVOKED`,\n              which is displayed as a \"COUNTERFEIT WARNING\" when scanned by consumers.\n\n              ## Backend Logic\n              1. Validates JWT token (middleware).\n              2. Applies `keccak256` to each entry in `serialNumbers`.\n              3. Calls `emergencyRevoke(bytes32[])` on the OilValidator contract.\n              4. Optionally logs `reason` to a PostgreSQL audit table (off-chain).\n\n              ## Request Body\n              | Field           | Type     | Required | Description                                          |\n              |-----------------|----------|----------|------------------------------------------------------|\n              | `serialNumbers` | string[] | yes      | Raw serial number strings to be hashed and revoked   |\n              | `reason`        | string   | no       | Audit reason stored off-chain in PostgreSQL          |\n\n              ## Success Response `200 OK`\n              ```json\n              {\n                \"success\": true,\n                \"data\": {\n                  \"revoked\": 2,\n                  \"txHash\": \"0xghi789...\",\n                  \"revokedIds\": [\n                    \"0x7f83b1657ff1fc53b92dc18148a1d65dfc2d4b1fa3d677284addd200126d9069\",\n                    \"0x2c624232cdd221771294dfbb310aca000a0df6ac8b66b696d90ef06fdefb64a3\"\n                  ]\n                }\n              }\n              ```\n\n              ## Error Responses\n              | Status | Code                     | Scenario                                          |\n              |--------|--------------------------|---------------------------------------------------|\n              | `401`  | `UNAUTHORIZED`           | Missing or invalid JWT token                      |\n              | `400`  | `VALIDATION_ERROR`       | Empty `serialNumbers` array                       |\n              | `404`  | `PRODUCT_NOT_FOUND`      | One or more IDs not found on-chain                |\n              | `409`  | `ALREADY_REVOKED`        | One or more IDs already have `REVOKED` status     |\n              | `500`  | `BLOCKCHAIN_TX_FAILED`   | Contract reverted or RPC unreachable              |\n      - info:\n          name: Variants\n          type: folder\n        items:\n          - info:\n              name: Add Variant\n              type: http\n              seq: 1\n            http:\n              method: POST\n              url: '{{baseUrl}}/admin/variants'\n              headers:\n                - name: Content-Type\n                  value: application/json\n                - name: Authorization\n                  value: Bearer {{token}}\n              body:\n                type: json\n                data: |-\n                  {\n                    \"brand\": \"Pertamina\",\n                    \"oilType\": \"SAE 10W-40\"\n                  }\n            runtime:\n              assertions:\n                - expression: res.status\n                  operator: eq\n                  value: '201'\n                - expression: res.body.success\n                  operator: eq\n                  value: 'true'\n                - expression: res.body.data.variantId\n                  operator: isNumber\n                  value: ''\n            settings:\n              encodeUrl: true\n              timeout: 60000\n              followRedirects: false\n              maxRedirects: 5\n            docs: |-\n              # POST /admin/variants\n\n              Adds a new oil variant master record on-chain.\n              Maps to smart contract: `addVariant(string brand, string oilType)`\n\n              **Protected:** Requires Admin JWT Bearer token.\n\n              ## Backend Logic\n              1. Validates JWT token (middleware).\n              2. Calls `addVariant(brand, oilType)` on the OilValidator contract.\n              3. Waits for transaction confirmation (tx receipt).\n              4. Returns the emitted `variantId` from the transaction log.\n\n              ## Request Body\n              | Field     | Type   | Required | Description                       |\n              |-----------|--------|----------|-----------------------------------|\n              | `brand`   | string | yes      | Oil brand name (e.g. \"Pertamina\") |\n              | `oilType` | string | yes      | Oil specification (e.g. \"10W-40\") |\n\n              ## Success Response `201 Created`\n              ```json\n              {\n                \"success\": true,\n                \"data\": {\n                  \"variantId\": 1,\n                  \"brand\": \"Pertamina\",\n                  \"oilType\": \"SAE 10W-40\",\n                  \"txHash\": \"0xabc123...\"\n                }\n              }\n              ```\n\n              ## Error Responses\n              | Status | Code                   | Scenario                              |\n              |--------|------------------------|---------------------------------------|\n              | `401`  | `UNAUTHORIZED`         | Missing or invalid JWT token          |\n              | `400`  | `VALIDATION_ERROR`     | Missing `brand` or `oilType` fields   |\n              | `409`  | `VARIANT_EXISTS`       | Variant with same brand+type exists   |\n              | `500`  | `BLOCKCHAIN_TX_FAILED` | Contract reverted or RPC unreachable  |\n\n              ```json\n              {\n                \"success\": false,\n                \"error\": {\n                  \"code\": \"BLOCKCHAIN_TX_FAILED\",\n                  \"message\": \"Transaction reverted by the smart contract.\"\n                }\n              }\n              ```\n  - info:\n      name: Auth\n      type: folder\n    items:\n      - info:\n          name: Login\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/auth/login'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"username\": \"admin\",\n                \"password\": \"your_admin_password\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                // Auto-save the JWT token for all subsequent requests\n                if (res.status === 200 && res.body.data && res.body.data.token) {\n                  bru.setVar(\"token\", res.body.data.token);\n                  console.log(\"Token saved:\", res.body.data.token);\n                }\n          assertions:\n            - expression: res.status\n              operator: eq\n              value: '200'\n            - expression: res.body.success\n              operator: eq\n              value: 'true'\n            - expression: res.body.data.token\n              operator: isString\n              value: ''\n        settings:\n          encodeUrl: true\n          timeout: 10000\n          followRedirects: false\n          maxRedirects: 5\n        docs: |-\n          # POST /auth/login\n\n          Authenticates the Admin and returns a signed JWT token.\n          The after-response script automatically stores the token in the\n          `token` collection variable.\n\n          ## Request Body\n          | Field      | Type   | Required | Description             |\n          |------------|--------|----------|-------------------------|\n          | `username` | string | yes      | Admin username          |\n          | `password` | string | yes      | Admin password          |\n\n          ## Success Response `200 OK`\n          ```json\n          {\n            \"success\": true,\n            \"data\": {\n              \"token\": \"<jwt_string>\",\n              \"expiresIn\": 86400\n            }\n          }\n          ```\n\n          ## Error Responses\n          | Status | Code                  | Scenario                    |\n          |--------|-----------------------|-----------------------------|\n          | `401`  | `INVALID_CREDENTIALS` | Wrong username or password  |\n          | `400`  | `VALIDATION_ERROR`    | Missing required fields     |\n          | `500`  | `INTERNAL_ERROR`      | Server-side error           |\n\n          ```json\n          {\n            \"success\": false,\n            \"error\": {\n              \"code\": \"INVALID_CREDENTIALS\",\n              \"message\": \"Username or password is incorrect.\"\n            }\n          }\n          ```\n  - info:\n      name: Products\n      type: folder\n    items:\n      - info:\n          name: Get Product Details\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/products/:serialNumber'\n          headers:\n            - name: Accept\n              value: application/json\n          params:\n            - name: serialNumber\n              value: OIL-PERT-2024-000001\n              type: path\n        runtime:\n          assertions:\n            - expression: res.status\n              operator: in\n              value: 200,404\n            - expression: res.body.success\n              operator: eq\n              value: 'true'\n        settings:\n          encodeUrl: true\n          timeout: 15000\n          followRedirects: false\n          maxRedirects: 5\n        docs: |-\n          # GET /products/:serialNumber\n\n          Returns the full on-chain state for a single product.\n          Maps to smart contract: `getProductDetails(bytes32 productId)`\n\n          **Public:** No authentication required.\n\n          ## Backend Logic\n          1. Hashes `serialNumber` \u2192 `bytes32` via `keccak256`.\n          2. Calls `getProductDetails(bytes32)` (view call, no gas).\n          3. Returns the decoded struct.\n\n          ## Path Parameter\n          | Param          | Type   | Description                                      |\n          |----------------|--------|--------------------------------------------------|\n          | `serialNumber` | string | Raw serial number (will be hashed by backend)    |\n\n          ## Success Response `200 OK`\n          ```json\n          {\n            \"success\": true,\n            \"data\": {\n              \"productId\": \"0x7f83b1657ff1fc53b92dc18148a1d65dfc2d4b1fa3d677284addd200126d9069\",\n              \"serialNumber\": \"OIL-PERT-2024-000001\",\n              \"status\": \"USED\",\n              \"variantId\": 1,\n              \"variant\": {\n                \"brand\": \"Pertamina\",\n                \"oilType\": \"SAE 10W-40\"\n              },\n              \"validatedAt\": \"2024-07-15T10:30:00.000Z\",\n              \"scanLocation\": \"Jakarta Selatan, DKI Jakarta, ID\",\n              \"registeredAt\": \"2024-07-01T00:00:00.000Z\"\n            }\n          }\n          ```\n\n          ## Possible `status` values\n          | Value    | Meaning                                                  |\n          |----------|----------------------------------------------------------|\n          | `NEW`    | Registered, not yet scanned by consumer                  |\n          | `USED`   | Already validated \u2014 first scan consumed this identity    |\n          | `REVOKED`| Invalidated by Admin via `emergencyRevoke`               |\n\n          ## Error Responses\n          | Status | Code                | Scenario                                     |\n          |--------|---------------------|----------------------------------------------|\n          | `404`  | `PRODUCT_NOT_FOUND` | Serial number not registered on-chain        |\n          | `500`  | `RPC_ERROR`         | Blockchain RPC node unreachable              |\n  - info:\n      name: Stats\n      type: folder\n    items:\n      - info:\n          name: Get System Stats\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/stats'\n          headers:\n            - name: Accept\n              value: application/json\n        runtime:\n          assertions:\n            - expression: res.status\n              operator: eq\n              value: '200'\n            - expression: res.body.success\n              operator: eq\n              value: 'true'\n            - expression: res.body.data.totalRegistered\n              operator: isNumber\n              value: ''\n            - expression: res.body.data.totalValidated\n              operator: isNumber\n              value: ''\n        settings:\n          encodeUrl: true\n          timeout: 15000\n          followRedirects: false\n          maxRedirects: 5\n        docs: |-\n          # GET /stats\n\n          Returns system-wide counters from the OilValidator contract.\n          Maps to smart contract: `getSystemStats()`\n\n          **Public:** No authentication required.\n          **Redis Cached:** TTL = 60 seconds.\n\n          ## Redis Caching Strategy\n          Calling `getSystemStats()` on every page load would hammer the RPC node.\n          The backend caches the result in Redis under the key `cache:system:stats`.\n          On cache miss \u2192 call contract \u2192 store result \u2192 return to client.\n          On cache hit \u2192 return cached result immediately.\n\n          The response includes `meta.cachedAt` so the frontend can show\n          \"Stats as of X seconds ago\" to users.\n\n          ## Success Response `200 OK`\n          ```json\n          {\n            \"success\": true,\n            \"data\": {\n              \"totalRegistered\": 50000,\n              \"totalValidated\": 32847,\n              \"totalVariants\": 12,\n              \"totalRevoked\": 34\n            },\n            \"meta\": {\n              \"cachedAt\": \"2024-07-15T10:29:00.000Z\",\n              \"cacheTtlSeconds\": 60,\n              \"cacheSource\": \"redis\"\n            }\n          }\n          ```\n\n          ## Error Responses\n          | Status | Code        | Scenario                        |\n          |--------|-------------|---------------------------------|\n          | `500`  | `RPC_ERROR` | Blockchain RPC node unreachable |\n  - info:\n      name: Validation\n      type: folder\n    items:\n      - info:\n          name: Validate Product\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/validate/:serialNumber'\n          headers:\n            - name: Content-Type\n              value: application/json\n          params:\n            - name: serialNumber\n              value: OIL-PERT-2024-000001\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"scanLocation\": \"Jakarta Selatan, DKI Jakarta, ID\"\n              }\n        runtime:\n          assertions:\n            - expression: res.status\n              operator: in\n              value: 200,400\n        settings:\n          encodeUrl: true\n          timeout: 60000\n          followRedirects: false\n          maxRedirects: 5\n        docs: |-\n          # POST /validate/:serialNumber\n\n          Consumer-facing validation endpoint. Triggered automatically when a\n          QR Code is scanned and the browser loads the frontend URL.\n\n          Maps to smart contract: `validateProduct(bytes32 productId, string scanLocation)`\n\n          **Public:** No authentication required.\n\n          ## Gas Relayer Pattern\n          The consumer does NOT need a crypto wallet or ETH.\n          The backend acts as a Gas Relayer:\n            1. Receives the raw `serialNumber` from the URL path.\n            2. Hashes it off-chain: `keccak256(abi.encodePacked(serialNumber))`.\n            3. Submits `validateProduct(bytes32, scanLocation)` using the company wallet.\n            4. Returns the final product status to the frontend.\n\n          ## Path Parameter\n          | Param          | Type   | Description                                      |\n          |----------------|--------|--------------------------------------------------|\n          | `serialNumber` | string | Raw serial number encoded in the scanned QR code |\n\n          ## Request Body\n          | Field          | Type   | Required | Description                                         |\n          |----------------|--------|----------|-----------------------------------------------------|\n          | `scanLocation` | string | yes      | Human-readable or geohash location of the scan     |\n\n          ## Success Response `200 OK` \u2014 Product is ORIGINAL (first scan)\n          ```json\n          {\n            \"success\": true,\n            \"data\": {\n              \"status\": \"VALID\",\n              \"productId\": \"0x7f83b1657ff1fc53b92dc18148a1d65dfc2d4b1fa3d677284addd200126d9069\",\n              \"serialNumber\": \"OIL-PERT-2024-000001\",\n              \"scanLocation\": \"Jakarta Selatan, DKI Jakarta, ID\",\n              \"validatedAt\": \"2024-07-15T10:30:00.000Z\",\n              \"txHash\": \"0xjkl012...\",\n              \"variant\": {\n                \"variantId\": 1,\n                \"brand\": \"Pertamina\",\n                \"oilType\": \"SAE 10W-40\"\n              }\n            }\n          }\n          ```\n\n          ## Error Response `400 Bad Request` \u2014 Already Validated (COUNTERFEIT WARNING)\n          Returned when the QR code has already been scanned once. The frontend MUST\n          display a red counterfeit warning screen using this payload.\n          ```json\n          {\n            \"success\": false,\n            \"error\": {\n              \"code\": \"ALREADY_VALIDATED\",\n              \"message\": \"This product has already been validated. It may be counterfeit.\",\n              \"data\": {\n                \"status\": \"USED\",\n                \"productId\": \"0x7f83b165...\",\n                \"serialNumber\": \"OIL-PERT-2024-000001\",\n                \"firstValidatedAt\": \"2024-07-10T08:15:00.000Z\",\n                \"firstScanLocation\": \"Bandung, Jawa Barat, ID\",\n                \"variant\": {\n                  \"variantId\": 1,\n                  \"brand\": \"Pertamina\",\n                  \"oilType\": \"SAE 10W-40\"\n                }\n              }\n            }\n          }\n          ```\n\n          ## Other Error Responses\n          | Status | Code                 | Scenario                                          |\n          |--------|----------------------|---------------------------------------------------|\n          | `400`  | `ALREADY_VALIDATED`  | QR already scanned \u2014 counterfeit warning          |\n          | `400`  | `PRODUCT_REVOKED`    | Product was emergency-revoked by Admin            |\n          | `400`  | `VALIDATION_ERROR`   | Missing `scanLocation` in body                    |\n          | `404`  | `PRODUCT_NOT_FOUND`  | Serial number not registered on-chain             |\n          | `500`  | `BLOCKCHAIN_TX_FAILED` | Contract reverted or RPC unreachable            |\n  - info:\n      name: Variants\n      type: folder\n    items:\n      - info:\n          name: Get Variant Details\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/variants/:variantId'\n          headers:\n            - name: Accept\n              value: application/json\n          params:\n            - name: variantId\n              value: '1'\n              type: path\n        runtime:\n          assertions:\n            - expression: res.status\n              operator: in\n              value: 200,404\n            - expression: res.body.success\n              operator: eq\n              value: 'true'\n        settings:\n          encodeUrl: true\n          timeout: 15000\n          followRedirects: false\n          maxRedirects: 5\n        docs: |-\n          # GET /variants/:variantId\n\n          Returns master data for a specific oil variant.\n          Maps to smart contract: `getVariantDetails(uint256 variantId)`\n\n          **Public:** No authentication required.\n          **Cached:** Response is cached in Redis (TTL: 300 seconds).\n          Variant data is immutable once created, making it safe to cache aggressively.\n\n          ## Path Parameter\n          | Param       | Type   | Description                         |\n          |-------------|--------|-------------------------------------|\n          | `variantId` | number | On-chain variant ID (uint256)       |\n\n          ## Success Response `200 OK`\n          ```json\n          {\n            \"success\": true,\n            \"data\": {\n              \"variantId\": 1,\n              \"brand\": \"Pertamina\",\n              \"oilType\": \"SAE 10W-40\",\n              \"createdAt\": \"2024-07-01T00:00:00.000Z\",\n              \"totalRegistered\": 1000\n            },\n            \"meta\": {\n              \"cachedAt\": \"2024-07-15T10:00:00.000Z\",\n              \"cacheSource\": \"redis\"\n            }\n          }\n          ```\n\n          ## Error Responses\n          | Status | Code                | Scenario                              |\n          |--------|---------------------|---------------------------------------|\n          | `400`  | `VALIDATION_ERROR`  | `variantId` is not a valid number     |\n          | `404`  | `VARIANT_NOT_FOUND` | Variant ID does not exist on-chain    |\n          | `500`  | `RPC_ERROR`         | Blockchain RPC node unreachable       |\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-06-05T04:36:35.262Z'\n    exportedUsing: Bruno/3.4.2\n";
        new window.OpenCollection({
            target: document.getElementById('opencollection-container'),
            opencollection: collectionData,
            theme: 'light',
            gitCollectionUrl: "https://github.com/alizaenazet/oil-chain-validator.git"
        });
    </script>
